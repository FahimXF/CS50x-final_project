{% extends "layout.html"%}

{% block title%}
Register
{%endblock %}

{% block main %}
    <form action="/register" method="post">
        <div class="mb-3">
            <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="id" placeholder="ID" type="number">
        </div>
        <div class="mb-3">
            <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="name" placeholder="Name" type="text">
        </div>
        <div class="mb-3">
            <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="semester" placeholder="Semester" type="number">
        </div>
        <div class="mb-3">
            <input class="form-control mx-auto w-auto" name="password" placeholder="Password" type="password">
        </div>
        <div class="mb-3">
            <input class="form-control mx-auto w-auto" name="confirmation" placeholder="Confirm Password" type="password">
        </div>
        
        <div id="subjects-container">
            <div class="mb-3 row align-items-center">
                <div class="col-6">
                    <input class="form-control subject-input" name="subject[]" placeholder="Subject" type="text">
                </div>
                <div class="col-3">
                    <input class="form-control credit-input" name="credit[]" placeholder="Credit" type="number" step="0.01">
                </div>
                <div class="col-1">
                    <button class="btn btn-danger" type="button" onclick="removeSubject(this)">Remove</button>
                </div>
            </div>
        </div>
        
        <button class="btn btn-secondary mb-3" type="button" onclick="addSubject()">Add Subject</button>
        <div>
            <button class="btn btn-primary" type="submit">Register</button>
        </div>
    </form>
    
    <style>
        .subject-input {
            max-width: 100%;
        }
        .credit-input {
            max-width: 100%;
        }
    </style>
    
    <script>
    function addSubject() {
        const container = document.getElementById('subjects-container');
        const newSubject = document.createElement('div');
        newSubject.className = 'mb-3 row align-items-center';
        newSubject.innerHTML = `
            <div class="col-6">
                <input class="form-control subject-input" name="subject[]" placeholder="Subject" type="text">
            </div>
            <div class="col-3">
                <input class="form-control credit-input" name="credit[]" placeholder="Credit" type="number" step="0.01">
            </div>
            <div class="col-1">
                <button class="btn btn-danger" type="button" onclick="removeSubject(this)">Remove</button>
            </div>
        `;
        container.appendChild(newSubject);
    }
    
    function removeSubject(button) {
        const subjectRow = button.parentElement.parentElement;
        subjectRow.remove();
    }
    </script>
{% endblock %}
